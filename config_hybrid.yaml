data:
  h5_path:   "/data/mldc/pde_bench/Turb_M1.hdf5"
  field_key: "pressure"
  timestep:  15
  tile_size: 32   # non-overlapping SVD tiles; 256//32=8 → 8³=512 tiles for 256³ volume

svd:
  k: 50   # keep top 50 of 512 modes (~10%); enough to capture bulk of global variance

model:
  features:      128
  in_channels:   1
  kernel_size:   9         # must be odd
  stride:        8         # whole-vol code: 128 × (256/8)³ = 128×32³ = 4,194,304 positions
  lambda_:       0.10      # start higher to push toward sparsity sooner
  tau:           100
  lca_iters:     600
  learning_rate: 0.01

training:
  max_epochs: 400
  n_passes_per_epoch: 30   # forward+Hebbian passes per epoch; compensates for single-sample training
  lambda_anneal_start: 10  # time-based anneal: begin at epoch 10
  lambda_anneal_stop:  200
  lambda_anneal_every: 1
  lambda_anneal_step:  0.03
  dtype: "float32"
  rel_err_target:  null    # time-based annealing (no rel_err gate)
  rel_err_ceiling: 0.01    # best-checkpoint gate and λ skip guard
  stabilize_epochs: 10

output:
  plot_start_epoch: 5
