data:
  image_glob: "cifar-10-images/*/*.png"   # local CIFAR-10 PNGs
  batch_size: 256
  num_workers: 4

model:
  features: 128
  in_channels: 3
  kernel_size: 9           # must be odd (lcapt pad='same' requires odd kernel)
  stride: 4
  lambda_: 0.05            # low start: let dict learn reconstruction quality before sparsity pressure
  tau: 100
  lca_iters: 750
  learning_rate: 0.005

training:
  epochs: 55
  lambda_anneal_start: 15  # warmup: 15 epochs of free reconstruction before any annealing
  lambda_anneal_stop: 40   # hold λ fixed from epoch 40 onward (λ≈0.57 at that point)
  lambda_anneal_every: 1   # anneal every epoch during the annealing phase
  lambda_anneal_step: 0.01  # λ trajectory: 0.05 → (ep15) 0.07 → ... → (ep40) 0.57 → hold until ep54
  print_freq: 20
  dtype: "float32"

output:
  n_images: 4
