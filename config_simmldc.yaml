svd:
  backend: "numpy"    # "sklearn" (randomized_svd) or "numpy" (linalg.svd, exact but slower)

data:
  h5_path:   "/data/mldc/pde_bench/Turb_M1.hdf5"
  field_key: "pressure"
  timestep:  15          # index into the nt dimension (0-based → physical t=16)
  # --- multi-snapshot training + held-out eval (svd_lca_hybrid.py only) ---
  train_timesteps: [5, 10, 15, 20, 25, 30]  # pool of snapshots to fit SVD basis + LCA dict (nt=41, 0-40)
  eval_timestep:   35                        # held-out snapshot for generalization eval, never fit on
  # Both keys are optional and ignored by lca_sim_mldc_SingleSnaptshot.py / svd_compression.py,
  # which always use `timestep` above. When absent, svd_lca_hybrid.py falls back to the single
  # `timestep` for both fitting and reporting (fit==eval, no generalization test).
  patch_size:  27   # 3D patch side length; must be divisible by stride (27/9=3 positions/side)
  n_patches:   2100      # virtual epoch size (random crops per epoch)
  batch_size: 256
  num_workers: 4

model:
  features:     128      # overcomplete relative to the 64-atom baseline — gives the sparse-support
                          # lever (adaptive per-position atom choice) real room to beat a fixed SVD subspace
  in_channels:  1        # scalar field (pressure)
  kernel_size:  9        # must be odd; atoms spanning 9³ voxels
  stride:       9        # non-overlapping — cuts code positions 27x vs stride=3 (9³=729 -> 3³=27
                          # positions/patch). LCAConv3D's pad='same' requires stride to evenly divide
                          # the volume it runs on; with patch_size=27=3³, only 1/3/9/27 are valid —
                          # stride=6 (naive K//2) silently breaks (shape-mismatch crash), stride=9 is
                          # the closest valid option to the recommended K//2..K reduced-overlap range.
  lambda_:      0.02     # low start — let dict converge before enforcing sparsity
  tau:          100
  lca_iters:    400
  learning_rate: 0.001   # low lr — prevents Hebbian weight-norm collapse over long runs

training:
  max_epochs: 400           # safety cap
  lambda_anneal_start: 40   # let dict converge before first anneal
  lambda_anneal_stop:  200  # max epochs in annealing mode
  lambda_anneal_every: 20   # increment λ every 20 epochs (max λ ≈ 0.02 + 10×0.005 = 0.07)
  lambda_anneal_step:  0.005
  dtype: "float32"
  rel_err_target:   null    # disabled — use fixed schedule so λ always anneals
  rel_err_ceiling:  0.20    # best checkpoint saved while rel_err <= this
  stabilize_epochs: 10      # epochs to freeze λ; done when anneal_stop reached + stabilized

output:
  n_images: 4
  plot_start_epoch: 5   # training_metrics_tail.png starts here; 0 = disabled

# Optional LCA training on SVD residual (used by svd_lca_hybrid.py only).
# Remove this section entirely to run svd_lca_hybrid.py as a pure SVD sweep.
lca:
  # Hybrid architecture (Try 2 / best bet): SVD absorbs the smooth global modes cheaply at a
  # small k, then this overcomplete conv LCA dictionary mops up only the (sparser, more
  # non-Gaussian) residual — attacking bytes_svd(small k) + bytes_lca(very sparse) vs. a much
  # larger standalone SVD k needed for the same rel_err.
  svd_k: 24             # SVD rank for the residual; within the 20-40 sweet spot; null → best k from sweep
  features: 128         # overcomplete relative to the residual's reduced complexity
  kernel_size: 9        # must be odd
  stride: 9             # non-overlapping. Runs on the FULL tiled residual volume (D_out=243=3^5 for
                         # patch_size=27), so stride must divide D_out under pad='same' — stride=6
                         # (naive K//2) breaks with a shape-mismatch crash; 9 is the nearest valid
                         # option to the recommended reduced-overlap range.
  lambda_: 0.5
  tau: 100
  lca_iters: 500        # 5τ — well converged without excess compute
  learning_rate: 0.002  # low lr avoids epoch-to-epoch oscillation
  max_epochs: 400
  n_passes_per_epoch: 30
  dtype: "float32"
  lambda_anneal_stop:  100
  lambda_anneal_every: 1
  lambda_anneal_step:  0.005
  rel_err_target:  0.01   # 1% hybrid error target
  rel_err_ceiling: 0.10   # gate λ increment above this error
  stabilize_epochs: 10
